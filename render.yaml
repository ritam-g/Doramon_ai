services:
  - type: web
    name: perplexity-app
    env: node
    rootDir: .
    buildCommand: |
      npm --prefix Frontend ci --include=dev
      npm --prefix Frontend run build
      npm --prefix Backend ci --omit=dev
    startCommand: npm --prefix Backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_BUILD_DIR
        value: Frontend/dist
      - key: CLIENT_URL
        value: https://your-app.onrender.com
      - key: APP_URL
        value: https://your-app.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: VITE_API_URL
        value: /api
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_EMAIL_USER
        sync: false
      - key: GOOGLE_EMAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_FORCE_IPV4
        value: "true"
      - key: SMTP_CONNECTION_TIMEOUT
        value: "15000"
      - key: SMTP_GREETING_TIMEOUT
        value: "10000"
      - key: SMTP_SOCKET_TIMEOUT
        value: "20000"
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_END_URL
        sync: false
      - key: VECTOR_API_KEY
        sync: false
      - key: VECTOR_INDEX_NAME
        sync: false
